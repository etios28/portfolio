<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>404 — Page introuvable | Etienne Fiore</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Cabinet+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }

body {
  background: #06040f;
  color: #f0eeff;
  font-family: 'Cabinet Grotesk', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

/* ORBS */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  animation: orbFloat 10s ease-in-out infinite;
}
.orb-1 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(124,58,237,0.2) 0%, transparent 70%);
  top: -100px; left: -100px;
}
.orb-2 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(6,182,212,0.15) 0%, transparent 70%);
  bottom: -50px; right: -50px;
  animation-delay: -5s;
}
@keyframes orbFloat {
  0%,100% { transform: translate(0,0); }
  50% { transform: translate(20px,-30px); }
}

/* GRID */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(110,231,183,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(110,231,183,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

.container {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 2rem;
}

.error-code {
  font-family: 'Clash Display', sans-serif;
  font-size: clamp(8rem, 25vw, 16rem);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.05em;
  background: linear-gradient(135deg, rgba(167,139,250,0.15), rgba(6,182,212,0.1));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  position: relative;
  display: inline-block;
  margin-bottom: 0.5rem;
  animation: glitch 2s infinite;
}

.error-code::before,
.error-code::after {
  content: '404';
  position: absolute;
  top: 0; left: 0; right: 0;
  font-family: 'Clash Display', sans-serif;
  font-size: inherit;
  font-weight: 700;
  letter-spacing: inherit;
  background: none;
  -webkit-text-fill-color: transparent;
  opacity: 0;
}

.error-code::before {
  -webkit-text-stroke: 1px rgba(167,139,250,0.3);
  animation: glitch-1 2s infinite;
}

.error-code::after {
  -webkit-text-stroke: 1px rgba(6,182,212,0.3);
  animation: glitch-2 2s infinite;
}

@keyframes glitch {
  0%,70%,100% { transform: translate(0); }
  75% { transform: translate(-2px, 1px); }
  80% { transform: translate(2px, -1px); }
  85% { transform: translate(-1px, 2px); }
}
@keyframes glitch-1 {
  0%,69%,100% { opacity: 0; transform: translate(0); }
  72% { opacity: 1; transform: translate(-4px, 0); }
  78% { opacity: 0; }
}
@keyframes glitch-2 {
  0%,74%,100% { opacity: 0; transform: translate(0); }
  77% { opacity: 1; transform: translate(4px, 0); }
  83% { opacity: 0; }
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 100px;
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #8b7fc7;
  padding: 0.4rem 1rem;
  margin-bottom: 1.5rem;
}

.title {
  font-family: 'Clash Display', sans-serif;
  font-size: clamp(1.5rem, 4vw, 2.5rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 1rem;
}

.desc {
  color: #8b7fc7;
  font-size: 0.95rem;
  line-height: 1.7;
  max-width: 400px;
  margin: 0 auto 2.5rem;
}

.actions {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-home {
  background: linear-gradient(135deg, #7c3aed, #06b6d4);
  color: white;
  padding: 0.85rem 2rem;
  border-radius: 100px;
  font-family: 'Cabinet Grotesk', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.3s;
  box-shadow: 0 0 30px rgba(124,58,237,0.3);
}
.btn-home:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 50px rgba(124,58,237,0.5);
}

.btn-back {
  background: rgba(255,255,255,0.04);
  color: #f0eeff;
  padding: 0.85rem 2rem;
  border-radius: 100px;
  border: 1px solid rgba(255,255,255,0.08);
  font-family: 'Cabinet Grotesk', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.3s;
  cursor: pointer;
}
.btn-back:hover {
  border-color: rgba(167,139,250,0.4);
  transform: translateY(-3px);
}

.counter {
  margin-top: 3rem;
  font-size: 0.7rem;
  color: rgba(139,127,199,0.5);
  letter-spacing: 0.1em;
}

.counter span {
  color: #a78bfa;
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="container">
  <div class="badge">Erreur système</div>
  <div class="error-code">404</div>
  <h1 class="title">Page introuvable</h1>
  <p class="desc">Cette page n'existe pas ou a été déplacée. Retourne à l'accueil pour continuer.</p>
  <div class="actions">
    <a href="/" class="btn-home">Retour à l'accueil</a>
    <a onclick="history.back()" class="btn-back">Page précédente</a>
  </div>
  <div class="counter">Redirection automatique dans <span id="countdown">10</span>s</div>
</div>

<script>
let n = 10;
const el = document.getElementById('countdown');
const t = setInterval(() => {
  n--;
  el.textContent = n;
  if (n <= 0) { clearInterval(t); window.location.href = '/'; }
}, 1000);
</script>
</body>
</html>
