<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Démos — Etienne Fiore</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#06040f; color:#f0eeff; font-family:'DM Mono',monospace; min-height:100vh; }

/* ORBS */
.orb { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; animation:orbFloat 10s ease-in-out infinite; }
.orb-1 { width:400px; height:400px; background:radial-gradient(circle,rgba(124,58,237,0.2) 0%,transparent 70%); top:-100px; left:-100px; }
.orb-2 { width:300px; height:300px; background:radial-gradient(circle,rgba(6,182,212,0.15) 0%,transparent 70%); bottom:-50px; right:-50px; animation-delay:-5s; }
@keyframes orbFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-30px)} }

/* LOGIN */
#login-screen {
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  z-index:100;
}
.login-box {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px; padding:2.5rem 2rem;
  width:min(380px,90vw); text-align:center;
  backdrop-filter:blur(20px); position:relative; z-index:1;
}
.login-logo {
  font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800;
  background:linear-gradient(135deg,#a78bfa,#06b6d4);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:0.3rem;
}
.login-sub { font-size:0.7rem; color:#8b7fc7; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:2rem; }
.pin-display { display:flex; justify-content:center; gap:0.75rem; margin-bottom:2rem; }
.pin-dot { width:14px; height:14px; border-radius:50%; border:2px solid rgba(255,255,255,0.15); transition:all 0.2s; }
.pin-dot.filled { background:linear-gradient(135deg,#a78bfa,#06b6d4); border-color:transparent; box-shadow:0 0 12px rgba(167,139,250,0.5); }
.pin-dot.error { background:#f43f5e; border-color:transparent; animation:shake 0.4s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
.numpad { display:grid; grid-template-columns:repeat(3,1fr); gap:0.6rem; }
.num-btn {
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07);
  border-radius:12px; color:#f0eeff; font-family:'Syne',sans-serif;
  font-size:1.2rem; font-weight:700; padding:1rem; cursor:pointer; transition:all 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.num-btn:hover { background:rgba(167,139,250,0.1); border-color:rgba(167,139,250,0.3); }
.num-btn:active { transform:scale(0.94); }
.num-btn.del { font-size:0.9rem; color:#8b7fc7; }
.num-btn.empty { visibility:hidden; }

/* APP */
#app { display:none; padding:3rem 5% 4rem; position:relative; z-index:1; max-width:1200px; margin:0 auto; }

.app-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:3rem; flex-wrap:wrap; gap:1rem;
}
.app-logo {
  font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800;
  background:linear-gradient(135deg,#a78bfa,#06b6d4);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.app-sub { font-size:0.7rem; color:#8b7fc7; letter-spacing:0.08em; margin-top:0.2rem; }
.lock-btn {
  background:none; border:1px solid rgba(255,255,255,0.07); border-radius:8px;
  color:#8b7fc7; font-size:0.75rem; font-family:'DM Mono',monospace;
  padding:0.4rem 0.8rem; cursor:pointer; transition:all 0.2s;
}
.lock-btn:hover { border-color:rgba(244,63,94,0.4); color:#f43f5e; }

/* GRID */
.demos-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
  gap:1.5rem;
}

.demo-card {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:2rem 1.75rem;
  text-decoration:none;
  color:inherit;
  display:flex;
  flex-direction:column;
  gap:1rem;
  transition:all 0.3s cubic-bezier(0.23,1,0.32,1);
  position:relative;
  overflow:hidden;
  cursor:pointer;
}
.demo-card::before {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.05) 0%,transparent 60%);
  pointer-events:none;
}
.demo-card:hover {
  background:rgba(167,139,250,0.07);
  border-color:rgba(167,139,250,0.3);
  transform:translateY(-5px);
  box-shadow:0 20px 60px rgba(0,0,0,0.4), 0 0 40px rgba(124,58,237,0.1);
}

.demo-icon {
  width:48px; height:48px;
  background:rgba(124,58,237,0.15);
  border:1px solid rgba(124,58,237,0.25);
  border-radius:12px;
  display:grid; place-items:center;
  color:#a78bfa;
}
.demo-card:nth-child(2) .demo-icon { background:rgba(6,182,212,0.12); border-color:rgba(6,182,212,0.25); color:#67e8f9; }
.demo-card:nth-child(3) .demo-icon { background:rgba(244,63,94,0.1); border-color:rgba(244,63,94,0.2); color:#fb7185; }
.demo-card:nth-child(4) .demo-icon { background:rgba(251,191,36,0.1); border-color:rgba(251,191,36,0.2); color:#fbbf24; }
.demo-card:nth-child(5) .demo-icon { background:rgba(74,222,128,0.1); border-color:rgba(74,222,128,0.2); color:#4ade80; }

.demo-name {
  font-family:'Syne',sans-serif;
  font-size:1rem; font-weight:700;
  line-height:1.3;
}
.demo-file {
  font-size:0.65rem; color:#8b7fc7;
  letter-spacing:0.05em;
  margin-top:auto;
  display:flex; align-items:center; gap:0.4rem;
}
.demo-file::before {
  content:'';
  width:16px; height:1px;
  background:rgba(167,139,250,0.4);
  flex-shrink:0;
}
.demo-arrow {
  position:absolute; bottom:1.5rem; right:1.5rem;
  font-size:1rem; color:rgba(167,139,250,0.4);
  transition:all 0.2s;
}
.demo-card:hover .demo-arrow { color:#a78bfa; transform:translate(3px,-3px); }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">ETIENNE FIORE</div>
    <div class="login-sub">Sites de d&#233;monstration</div>
    <div class="pin-display">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
      <div class="pin-dot" id="d4"></div>
      <div class="pin-dot" id="d5"></div>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="addPin('1')">1</button>
      <button class="num-btn" onclick="addPin('2')">2</button>
      <button class="num-btn" onclick="addPin('3')">3</button>
      <button class="num-btn" onclick="addPin('4')">4</button>
      <button class="num-btn" onclick="addPin('5')">5</button>
      <button class="num-btn" onclick="addPin('6')">6</button>
      <button class="num-btn" onclick="addPin('7')">7</button>
      <button class="num-btn" onclick="addPin('8')">8</button>
      <button class="num-btn" onclick="addPin('9')">9</button>
      <button class="num-btn empty"></button>
      <button class="num-btn" onclick="addPin('0')">0</button>
      <button class="num-btn del" onclick="delPin()">&#9003;</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-header">
    <div>
      <div class="app-logo">D&#201;MOS_</div>
      <div class="app-sub">Sites de d&#233;monstration — usage priv&#233;</div>
    </div>
    <button class="lock-btn" onclick="lock()">Verrouiller</button>
  </div>

  <div class="demos-grid" id="demosGrid">
    <!-- Les cards sont générées par JS — modifie SITES pour ajouter/supprimer -->
  </div>
</div>

<script>
const PIN = '404404';

// ============================================================
// MODIFIE CETTE LISTE POUR AJOUTER / SUPPRIMER DES SITES
// Format : { name: 'Nom affiché', file: 'nom-du-fichier.html' }
// Le fichier doit être dans le dossier /demos/ sur GitHub
// ============================================================
const SITES = [
  { name: 'Smash Burger', file: 'smash-burger-vitrine.html' },
  { name: 'Fast Food', file: 'fastfood-vitrine.html' },
  { name: 'Pizza', file: 'pizza-vitrine.html' },
  { name: 'Cinematic 1', file: 'cinematic 1.html' },
  { name: 'Cinematic 2', file: 'cinematic 2.html' },
];
// ============================================================

const svgGlobe = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>`;

// Build grid
function buildGrid() {
  const grid = document.getElementById('demosGrid');
  grid.innerHTML = SITES.map(site => `
    <a class="demo-card" href="/demos/${encodeURIComponent(site.file)}" target="_blank">
      <div class="demo-icon">${svgGlobe}</div>
      <div class="demo-name">${site.name}</div>
      <div class="demo-file">${site.file}</div>
      <div class="demo-arrow">&#8599;</div>
    </a>
  `).join('');
}

// PIN logic
let current = '';

function addPin(n) {
  if (current.length >= 6) return;
  current += n;
  updateDots();
  if (current.length === 6) setTimeout(checkPin, 150);
}
function delPin() {
  current = current.slice(0, -1);
  updateDots();
}
function updateDots() {
  for (let i = 0; i < 6; i++) {
    const d = document.getElementById('d' + i);
    d.classList.toggle('filled', i < current.length);
    d.classList.remove('error');
  }
}
function checkPin() {
  if (current === PIN) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    buildGrid();
  } else {
    for (let i = 0; i < 6; i++) document.getElementById('d' + i).classList.add('error');
    setTimeout(() => { current = ''; updateDots(); }, 600);
  }
}
function lock() {
  current = ''; updateDots();
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}
document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') addPin(e.key);
  if (e.key === 'Backspace') delPin();
});
</script>
</body>
</html>
