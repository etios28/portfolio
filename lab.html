body { background:#06040f; color:#f0eeff; font-family:'DM Mono',monospace; min-height:100vh; display:flex; flex-direction:column; }

.login-logo {

}
.num-btn:hover { background:rgba(167,139,250,0.1); border-color:rgba(167,139,250,0.3); }
.num-btn:active { transform:scale(0.94); }
.num-btn.del { font-size:0.9rem; color:#8b7fc7; }
.num-btn.empty { visibility:hidden; }

#app { display:none; flex-direction:column; flex:1; height:100vh; }
.topbar {
  display:flex; align-items:center; gap:1rem; padding:0.75rem 1.25rem;
  background:rgba(6,4,15,0.95); border-bottom:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(20px); position:sticky; top:0; z-index:50; flex-shrink:0;
}
.topbar-logo {
  font-family:'Syne',sans-serif; font-size:0.9rem; font-weight:800;
  background:linear-gradient(135deg,#a78bfa,#06b6d4);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-right:auto;
}
.tab-btn {
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07);
  border-radius:100px; color:#8b7fc7; font-family:'DM Mono',monospace;
  font-size:0.72rem; padding:0.4rem 1rem; cursor:pointer; transition:all 0.2s; white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.tab-btn.active { background:rgba(167,139,250,0.15); border-color:rgba(167,139,250,0.4); color:#a78bfa; }
.lock-btn {
  background:none; border:1px solid rgba(255,255,255,0.07); border-radius:8px;
  color:#8b7fc7; font-size:0.75rem; padding:0.35rem 0.6rem; cursor:pointer; transition:all 0.2s;
}
.lock-btn:hover { border-color:rgba(244,63,94,0.4); color:#f43f5e; }
.frame-container { flex:1; position:relative; overflow:hidden; }
.app-frame { width:100%; height:100%; border:none; display:none; position:absolute; inset:0; }
.app-frame.active { display:block; }
</style>
</head>

<style>
:root{
  --gold:#D4A843;--gold-d:#8B6914;--gold-l:#F0C96A;
  --bg:#0A0A0B;--s:#1E1E24;--s2:#26262E;--bg3:#161619;
  --b:#2A2A34;--text:#E8E8F0;--mut:#6E6E85;
  --gr:#4ADE80;--rd:#F87171;--or:#FB923C;--bl:#60A5FA;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

/* ── HEADER ── */
header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:52px;
  background:rgba(10,10,11,.97);
  border-bottom:1px solid var(--b);
  display:flex;align-items:center;padding:0 1rem;gap:.5rem;
}
.logo{font-family:'Space Mono',monospace;font-size:.85rem;font-weight:700;letter-spacing:.12em;color:var(--gold);flex-shrink:0}
.logo span{color:var(--mut)}
.hclock{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--gold);margin-left:auto;flex-shrink:0;display:flex;align-items:center;gap:.3rem}
.hdot{width:5px;height:5px;border-radius:50%;background:var(--gr);animation:blink 2s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── BOTTOM NAV ── */
.bnav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(10,10,11,.97);
  border-top:1px solid var(--b);
  display:flex;height:58px;
}
.bnav button{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  background:none;border:none;color:var(--mut);cursor:pointer;
  font-family:'Syne',sans-serif;font-size:.58rem;font-weight:700;
  letter-spacing:.04em;text-transform:uppercase;
  transition:color .2s;padding:0;
}
.bnav button .ico{font-size:1.1rem;line-height:1}
.bnav button.active{color:var(--gold)}
.bnav button.active .ico{filter:drop-shadow(0 0 4px rgba(212,168,67,.5))}

/* ── PAGES ── */
.page{display:none;padding-top:62px;padding-bottom:68px;min-height:100vh}
.page.active{display:block;animation:up .25s ease}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.inner{padding:.85rem;max-width:600px;margin:0 auto}

/* ── SESSION STATUS CARD ── */
.status-card{
  background:linear-gradient(135deg,var(--s),var(--bg3));
  border:1px solid var(--b);border-radius:14px;
  padding:1rem 1.15rem;margin-bottom:.85rem;
  position:relative;overflow:hidden;
}
.status-card::after{
  content:'XAU';position:absolute;right:-.2rem;top:50%;
  transform:translateY(-50%);
  font-family:'Space Mono',monospace;font-size:4.5rem;font-weight:700;
  color:var(--gold);opacity:.05;pointer-events:none;line-height:1;
}
.status-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem}
.status-card h1{font-size:1.15rem;font-weight:800;color:var(--gold)}
.status-card .sub{font-size:.7rem;color:var(--mut);margin-top:.12rem}
.sbadge{
  font-family:'Space Mono',monospace;font-size:.58rem;font-weight:700;
  letter-spacing:.08em;padding:.26rem .6rem;border-radius:99px;
  text-transform:uppercase;white-space:nowrap;flex-shrink:0;
}
.s-on{background:rgba(74,222,128,.15);color:var(--gr);border:1px solid rgba(74,222,128,.3)}
.s-warn{background:rgba(251,146,60,.15);color:var(--or);border:1px solid rgba(251,146,60,.3)}
.s-off{background:rgba(248,113,113,.12);color:var(--rd);border:1px solid rgba(248,113,113,.25)}
.s-mine{background:rgba(212,168,67,.15);color:var(--gold);border:1px solid rgba(212,168,67,.3)}

/* ── SECTION LABEL ── */
.slbl{
  font-family:'Space Mono',monospace;font-size:.56rem;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;color:var(--mut);
  margin:.85rem 0 .55rem;display:flex;align-items:center;gap:.4rem;
}
.slbl::after{content:'';flex:1;height:1px;background:var(--b)}

/* ── SESSION CARDS ── */
.scard{
  background:var(--s);border:1px solid var(--b);border-radius:12px;
  padding:.8rem .95rem;margin-bottom:.5rem;
  display:flex;gap:.75rem;align-items:flex-start;position:relative;
}
.scard.hot{border-left:3px solid var(--gold)}
.scard.med{border-left:3px solid var(--or)}
.scard.dim{border-left:3px solid var(--mut)}
.scard.mine{border-left:3px solid var(--bl);background:rgba(96,165,250,.04)}
.scard.mine-m{border-left:3px solid var(--gold-l);background:rgba(212,168,67,.04);border-color:rgba(212,168,67,.2)}
.stime{font-family:'Space Mono',monospace;font-size:.78rem;font-weight:700;color:var(--gold);flex-shrink:0;width:74px}
.scard.mine .stime{color:var(--bl)}
.scard.mine-m .stime{color:var(--gold-l)}
.scard.dim .stime{color:var(--mut)}
.sinfo h3{font-size:.78rem;font-weight:700;margin-bottom:.1rem}
.sinfo p{font-size:.67rem;color:var(--mut);line-height:1.45}
.mbadge{
  position:absolute;top:.4rem;right:.5rem;
  font-family:'Space Mono',monospace;font-size:.5rem;font-weight:700;
  letter-spacing:.06em;padding:.1rem .34rem;border-radius:4px;text-transform:uppercase;
}
.mb-s{background:rgba(96,165,250,.18);color:var(--bl)}
.mb-p{background:rgba(212,168,67,.22);color:var(--gold)}

/* ── NEWS CARDS ── */
.ncard{
  background:var(--s);border:1px solid var(--b);border-radius:12px;
  padding:.8rem .95rem;margin-bottom:.5rem;
}
.nhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem}
.ncard h4{font-size:.8rem;font-weight:700}
.nipact{font-family:'Space Mono',monospace;font-size:.54rem;font-weight:700;padding:.14rem .36rem;border-radius:4px}
.ni-max{background:rgba(248,113,113,.2);color:var(--rd)}
.ni-hi{background:rgba(251,146,60,.2);color:var(--or)}
.ni-gld{background:rgba(212,168,67,.2);color:var(--gold)}
.nwhen{font-family:'Space Mono',monospace;font-size:.63rem;color:var(--mut);margin-bottom:.35rem}
.nrule{font-size:.68rem;color:var(--mut);line-height:1.55}
.up{color:var(--gr);font-weight:700}
.dn{color:var(--rd);font-weight:700}

/* ── LINK BUTTONS ── */
.lbtn{
  display:flex;align-items:center;gap:.7rem;
  background:var(--s);border:1px solid var(--b);border-radius:12px;
  padding:.8rem .95rem;margin-bottom:.5rem;
  text-decoration:none;color:var(--text);
  transition:all .18s;cursor:pointer;width:100%;
}
.lbtn:active{background:var(--s2);border-color:var(--gold-d);transform:scale(.99)}
.lbtn-ico{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;flex-shrink:0;
}
.lbtn-txt h4{font-size:.78rem;font-weight:700;margin-bottom:.08rem}
.lbtn-txt p{font-size:.65rem;color:var(--mut)}
.lbtn-arr{margin-left:auto;color:var(--mut);font-size:.8rem;flex-shrink:0}

/* ── CHECKLIST ── */
.ckitem{
  display:flex;align-items:flex-start;gap:.62rem;
  background:var(--bg3);border:1px solid var(--b);border-radius:9px;
  padding:.5rem .72rem;margin-bottom:.42rem;cursor:pointer;
  transition:border-color .18s;
}
.ckitem:active{border-color:var(--gold-d)}
.ckitem input{accent-color:var(--gold);width:14px;height:14px;flex-shrink:0;margin-top:.1rem;cursor:pointer}
.ckitem label{font-size:.7rem;color:var(--mut);line-height:1.45;cursor:pointer}
.ckitem.done label{text-decoration:line-through;opacity:.38}
.pgbar{height:3px;background:var(--b);border-radius:99px;overflow:hidden;margin-top:.5rem}
.pgfill{height:100%;background:linear-gradient(90deg,var(--gold-d),var(--gold));border-radius:99px;transition:width .35s}
.pglbl{font-family:'Space Mono',monospace;font-size:.56rem;color:var(--mut);margin-top:.28rem;text-align:right}

/* ── MODULE ACCORDION ── */
.mcard{background:var(--s);border:1px solid var(--b);border-radius:13px;margin-bottom:.65rem;overflow:hidden;transition:border-color .18s}
.mcard:active .mhead{background:rgba(255,255,255,.02)}
.mhead{display:flex;align-items:center;gap:.75rem;padding:.8rem .95rem;cursor:pointer;user-select:none}
.mnum{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.56rem;font-weight:700;flex-shrink:0}
.m1{background:rgba(96,165,250,.15);color:var(--bl)}
.m2{background:rgba(212,168,67,.15);color:var(--gold)}
.m3{background:rgba(251,146,60,.15);color:var(--or)}
.m4{background:rgba(74,222,128,.15);color:var(--gr)}
.mmeta{flex:1}
.mmeta h3{font-size:.84rem;font-weight:700}
.mmeta p{font-size:.65rem;color:var(--mut);margin-top:.08rem}
.marr{color:var(--mut);font-size:.68rem;flex-shrink:0;transition:transform .2s}
.marr.open{transform:rotate(180deg)}
.mbody{display:none;border-top:1px solid var(--b);padding:.9rem}
.mbody.open{display:block}
.mlist{list-style:none;display:flex;flex-direction:column;gap:.28rem;margin-bottom:.75rem}
.mlist li{font-size:.7rem;color:var(--mut);padding-left:.85rem;position:relative;line-height:1.5}
.mlist li::before{content:'→';position:absolute;left:0;color:var(--gold);font-size:.6rem}
.vrec{background:var(--bg3);border:1px solid var(--b);border-radius:9px;padding:.55rem .8rem;margin-top:.32rem;display:flex;align-items:center;gap:.6rem}
.ytbtn{width:22px;height:22px;background:#FF0000;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.56rem;flex-shrink:0;color:#fff}
.vrec h5{font-size:.7rem;font-weight:700}
.vrec p{font-size:.6rem;color:var(--mut);margin-top:.04rem;font-family:'Space Mono',monospace}
.exbox{background:rgba(212,168,67,.06);border:1px solid rgba(212,168,67,.2);border-radius:9px;padding:.6rem .8rem;margin-top:.6rem;font-size:.69rem;color:var(--mut);line-height:1.5}
.exbox strong{color:var(--gold)}

/* ── DOC ── */
.dbox{background:var(--s);border:1px solid var(--b);border-radius:13px;padding:.95rem;margin-bottom:.65rem}
.dbox h3{font-size:.82rem;font-weight:700;color:var(--gold);margin-bottom:.55rem}
.dbox li{font-size:.69rem;color:var(--mut);line-height:1.6;list-style:none}
.dbox li::before{content:'▸ ';color:var(--gold)}
.dbox ul{display:flex;flex-direction:column;gap:.24rem}
.trow{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin-top:.6rem}
.titem{background:var(--bg3);border:1px solid var(--b);border-radius:9px;padding:.6rem;font-size:.67rem;color:var(--mut);line-height:1.5}
.titem strong{color:var(--text);display:block;margin-bottom:.12rem;font-size:.69rem}
.stable{width:100%;border-collapse:collapse;margin-top:.6rem;font-size:.68rem}
.stable th{background:var(--bg3);color:var(--mut);font-family:'Space Mono',monospace;font-size:.53rem;letter-spacing:.06em;padding:.38rem .6rem;text-align:left;border-bottom:1px solid var(--b)}
.stable td{padding:.45rem .6rem;border-bottom:1px solid rgba(42,42,52,.5);color:var(--mut)}
.stable td:first-child{color:var(--text);font-weight:700}
.dlist{display:flex;flex-direction:column;gap:.3rem}
.ditem{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.2);border-radius:8px;padding:.4rem .62rem;font-size:.68rem;color:var(--mut);display:flex;align-items:flex-start;gap:.38rem}
.ditem::before{content:'🚫';font-size:.68rem;flex-shrink:0}
</style>
</head>

<script>
// ── CLOCK ──
function tick(){
  const n=new Date(),p=v=>String(v).padStart(2,'0');
  document.getElementById('clk').textContent=p(n.getHours())+':'+p(n.getMinutes());
  session(n.getHours(),n.getMinutes());
}
setInterval(tick,10000);tick();

function session(h,m){
  const t=h*60+m;
  let txt,cls;
  if(t>=750&amp;&amp;t<810)       {txt='⭐ Ton créneau midi';cls='s-mine';}
  else if(t>=1020&amp;&amp;t<1260){txt='🔥 Ton créneau soir';cls='s-mine';}
  else if(t>=480&amp;&amp;t<660)  {txt='🟢 Session Londres';cls='s-on';}
  else if(t>=870&amp;&amp;t<1020) {txt='🔥 Session New York';cls='s-on';}
  else if(t>=660&amp;&amp;t<870)  {txt='⚡ Transition';cls='s-warn';}
  else                    {txt='🔴 Hors session';cls='s-off';}
  ['sbadge','sbadge2'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){el.textContent=txt;el.className='sbadge '+cls;}
  });
}

// ── NAV ──
function go(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bnav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(btn)btn.classList.add('active');
  window.scrollTo(0,0);
}

// ── ACCORDION ──
function tog(id){
  const b=document.getElementById('b-'+id),a=document.getElementById('a-'+id);
  b.classList.toggle('open');
  a.classList.toggle('open',b.classList.contains('open'));
}

// ── CHECKLIST ──
function chk(item){
  const cb=item.querySelector('input');
  cb.checked=!cb.checked;
  item.classList.toggle('done',cb.checked);
  const t=document.querySelectorAll('#ck .ckitem').length;
  const d=document.querySelectorAll('#ck .ckitem.done').length;
  document.getElementById('pf').style.width=(d/t*100)+'%';
  document.getElementById('pl').textContent=d+' / '+t;
}
</script>

<script>
const PIN = '40428';
let current = '';

function addPin(n) {
  if (current.length >= 5) return;
  current += n;
  updateDots();
  if (current.length === 5) setTimeout(checkPin, 150);
}
function delPin() {
  current = current.slice(0, -1);
  updateDots();
}
function updateDots() {
  for (let i = 0; i < 5; i++) {
    const d = document.getElementById('d' + i);
    d.classList.toggle('filled', i < current.length);
    d.classList.remove('error');
  }
}
function checkPin() {
  if (current === PIN) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
  } else {
    for (let i = 0; i < 5; i++) document.getElementById('d' + i).classList.add('error');
    setTimeout(() => { current = ''; updateDots(); }, 600);
  }
}
function switchTab(tab) {
  document.querySelectorAll('.app-frame').forEach(f => f.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('frame-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}
function lock() {
  current = ''; updateDots();
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}
document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') addPin(e.key);
  if (e.key === 'Backspace') delPin();
});
</script>
